# Browser E2E for advertised core flows (DFA, stories, Family Hub, safety alerts).
# Requires production build — tests run against vite preview on port 4173.
name: Core features E2E

on:
  workflow_dispatch:
  pull_request:
    branches: [main, master]
    paths:
      - '.github/workflows/e2e-core-features.yml'
      - 'e2e/**'
      - 'playwright.config.ts'
      - 'src/**'
      - 'index.html'
      - 'vite.config.ts'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
  push:
    branches: [main, master]
    paths:
      - '.github/workflows/e2e-core-features.yml'
      - 'e2e/**'
      - 'playwright.config.ts'
      - 'src/**'
      - 'index.html'
      - 'vite.config.ts'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'

concurrency:
  group: e2e-core-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: npm

      - run: npm ci --ignore-scripts

      - run: npm run check:routes
      - run: npm run check:content-truth
      - run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run core advertised E2E
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
