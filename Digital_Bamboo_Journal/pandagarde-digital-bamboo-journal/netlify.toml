# Static multipage site — journal.pandagarde.com
# Netlify UI: Base directory = Digital_Bamboo_Journal/pandagarde-digital-bamboo-journal

[build]
  publish = "."

[build.processing]
  skip_processing = true

# CSS/JS are versioned with ?v= query strings, so they can cache aggressively.
[[headers]]
  for = "/assets/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/assets/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/assets/*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# Feeds and sitemap change on each publish; revalidate.
[[headers]]
  for = "/*.xml"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
