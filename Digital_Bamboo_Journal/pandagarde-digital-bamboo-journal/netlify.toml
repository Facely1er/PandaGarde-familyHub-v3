# Static multipage site — journal.pandagarde.com
# Netlify UI: Base directory = Digital_Bamboo_Journal/pandagarde-digital-bamboo-journal
# Build command: (none) · Publish directory: .

[build]
  publish = "."

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
