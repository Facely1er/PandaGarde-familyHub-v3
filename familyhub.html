<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/LogoPandagarde.png" />
    <link rel="manifest" href="/familyhub-manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="theme-color" content="#0d9488" />
    <meta name="description" content="PandaGarde Family Hub — daily privacy missions and family progress. Local-first, no account required." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Family Hub" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="apple-touch-icon" href="/LogoPandagarde.png" />
    <title>PandaGarde Family Hub</title>
  </head>
  <body>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('pandagarde-theme');
          if (t !== 'dark' && t !== 'light') {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/familyhub-main.tsx"></script>
  </body>
</html>
