# Second Netlify site for hub.pandagarde.com
# In Netlify: Site settings → Build & deploy → Set "Configuration file" to netlify-familyhub.toml

[build]
  publish = "dist-familyhub"
  command = "node scripts/netlify-build.mjs"

[build.environment]
  NODE_VERSION = "20.20.2"
  VITE_HUB_STANDALONE = "true"
  VITE_WEBSITE_URL = "https://www.pandagarde.com"

[[redirects]]
  from = "/favicon.ico"
  to = "/LogoPandagarde.png"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.sentry.io; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://*.supabase.co https://*.sentry.io; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/offline.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/familyhub-manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
