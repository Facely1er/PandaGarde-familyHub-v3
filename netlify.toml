[build]
  publish = "dist"
  # Routes hub Netlify site (09a33b67…) to build:familyhub even if this file is used by mistake
  command = "node scripts/netlify-build.mjs"

[build.environment]
  NODE_VERSION = "20.20.2"

[[redirects]]
  from = "/favicon.ico"
  to = "/LogoPandagarde.png"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com https://*.sentry.io; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://*.supabase.co https://*.sentry.io https://www.google-analytics.com https://www.googletagmanager.com https://api.allorigins.win https://www.commonsensemedia.org https://www.connectsafely.org https://www.consumer.ftc.gov https://feeds.feedburner.com https://www.eff.org; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"