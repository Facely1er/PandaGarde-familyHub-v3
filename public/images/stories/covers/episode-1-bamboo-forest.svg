<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-label="Digital Bamboo Forest">
  <defs>
    <linearGradient id="ep1-sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#064e3b"/>
      <stop offset="45%" stop-color="#047857"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="ep1-glow" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0"/>
      <stop offset="100%" stop-color="#6ee7b7" stop-opacity="0.45"/>
    </linearGradient>
    <radialGradient id="ep1-center" cx="50%" cy="55%" r="45%">
      <stop offset="0%" stop-color="#ecfdf5" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ecfdf5" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="640" height="360" fill="url(#ep1-sky)"/>
  <rect width="640" height="360" fill="url(#ep1-glow)"/>
  <rect width="640" height="360" fill="url(#ep1-center)"/>
  <!-- Bamboo stalks -->
  <g fill="#065f46" opacity="0.85">
    <rect x="40" y="80" width="18" height="280" rx="9"/>
    <rect x="72" y="120" width="14" height="240" rx="7"/>
    <rect x="520" y="90" width="20" height="270" rx="10"/>
    <rect x="560" y="130" width="16" height="230" rx="8"/>
    <rect x="590" y="100" width="12" height="260" rx="6"/>
  </g>
  <g stroke="#a7f3d0" stroke-width="2" opacity="0.5">
    <path d="M49 140h18M49 200h18M49 260h18"/>
    <path d="M529 150h20M529 210h20M529 270h20"/>
  </g>
  <!-- Digital pathways -->
  <g fill="none" stroke="#6ee7b7" stroke-width="2" opacity="0.7">
    <path d="M120 280 Q200 200 320 220 T520 180"/>
    <path d="M80 240 Q180 160 300 190 T480 150"/>
    <circle cx="320" cy="215" r="6" fill="#ecfdf5"/>
    <circle cx="200" cy="250" r="4" fill="#ecfdf5"/>
    <circle cx="420" cy="195" r="5" fill="#ecfdf5"/>
  </g>
  <!-- Shield motif -->
  <path d="M320 130 L280 155 v55 l40 35 40-35 v-55z" fill="#064e3b" stroke="#a7f3d0" stroke-width="3" opacity="0.9"/>
  <path d="M320 148 l-22 18v38 l22 18 22-18v-38z" fill="#10b981" opacity="0.6"/>
</svg>
